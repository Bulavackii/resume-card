<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Визитка | Анна Булавацкая</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --accent: #2563eb; --glass: rgba(255, 255, 255, 0.9); }
    body { font-family: 'Inter', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 20px 10px; }
    
    .card { 
      background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); max-width: 500px; margin: auto; padding: 2rem;
    }

    .profile-img { width: 120px; height: 120px; border-radius: 20px; object-fit: cover; margin-bottom: 1.5rem; border: 4px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    h1 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-bottom: 0.2rem; }
    .position { color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-bottom: 1.5rem; }

    .info-item { 
      display: flex; align-items: center; gap: 15px; padding: 12px; background: rgba(241, 245, 249, 0.8);
      border-radius: 16px; margin-bottom: 10px; transition: transform 0.2s; text-decoration: none; color: #334155;
    }
    .info-item:hover { transform: translateY(-2px); background: #e2e8f0; }
    .info-item i { width: 20px; color: var(--accent); }

    .btn-action { 
      background: var(--accent); color: white; border-radius: 16px; padding: 12px; 
      font-weight: 600; border: none; width: 100%; margin-top: 10px;
    }
    .btn-action:hover { background: #1d4ed8; color: white; }

    /* Темная тема (Слабовидящие) */
    .vi { background: #000; }
    .vi .card { background: #111; color: #fff; }
    .vi .info-item { background: #222; color: #fff; }
  </style>
</head>
<body>

<div class="card text-center">
  <img src="photo.jpg" alt="Анна Булавацкая" class="profile-img">
  <h1>Анна Булавацкая</h1>
  <div class="position">Главный специалист-эксперт</div>

  <a href="tel:+79256277718" class="info-item"><i class="fas fa-phone"></i> +7 (925) 627-77-18</a>
  <a href="mailto:annalex88@mail.ru" class="info-item"><i class="fas fa-envelope"></i> annalex88@mail.ru</a>
  <div class="info-item"><i class="fas fa-map-marker-alt"></i> Московское-Окское БВУ</div>

  <a href="anna-bulavatskaya.vcf" class="btn btn-action"><i class="fas fa-download"></i> Сохранить контакт</a>
  <button class="btn btn-outline-secondary btn-action" style="background:transparent; color:#64748b;" onclick="document.body.classList.toggle('vi')">
    <i class="fas fa-eye"></i> Версия для слабовидящих
  </button>
</div>

</body>
</html>
