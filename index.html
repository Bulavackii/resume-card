<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Визитка | [ФАМИЛИЯ И.О.]</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; background: #f8fafc; padding: 1rem; }
    .card { background: #fff; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 800px; margin: auto; padding: 2rem; }
    
    /* Логотип */
    .org-logo { width: 45px; height: 45px; background-image: url('gerb_white.jpg'); background-size: contain; background-repeat: no-repeat; background-position: center; margin: 0 auto 1rem auto; }
    .org-title { text-align: center; font-size: 0.9rem; color: #334155; margin-bottom: 2rem; }
    
    /* Профиль */
    .profile { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .profile img { width: 90px; height: 90px; object-fit: cover; border-radius: 50%; }
    .profile-info h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; color: #1d4ed8; }
    .profile-info h2 { margin: 0; font-size: 1.2rem; color: #334155; }
    
    .position { font-size: 0.95rem; font-weight: bold; margin-bottom: 1.5rem; color: #1f2937; text-align: center; }
    .info-block { background-color: #e2e8f0; border-radius: 0.5rem; padding: 0.75rem 1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; }
    .info-block i { color: #2563eb; min-width: 20px; }
    .quote { background: #f1f5f9; font-style: italic; border-left: 4px solid #60a5fa; padding: 1rem; border-radius: 0.5rem; margin: 1.5rem 0; }
    
    /* Темная тема */
    .visually-impaired { background: #000 !important; color: #fff !important; }
    .visually-impaired .card { background: #111 !important; color: #fff !important; }
    .visually-impaired .info-block { background-color: #222 !important; color: #fff !important; border: 1px solid #999; }
    .visually-impaired a { color: #00ffff !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="org-logo"></div>
      <div class="org-title">
        Московско-Окское бассейновое водное управление<br>
        Федерального агентства водных ресурсов
      </div>

      <div class="profile">
        <img src="photo.jpg" alt="Фото">
        <div class="profile-info">
          <h1>ФАМИЛИЯ</h1>
          <h2>Имя Отчество</h2>
        </div>
      </div>

      <div class="position">Должность сотрудника</div>

      <div class="info-block"><i class="fas fa-mobile-alt"></i><a href="tel:+70000000000">+7 (000) 000-00-00</a></div>
      <div class="info-block"><i class="fas fa-phone"></i><a href="tel:+70000000000">+7 (000) 000-00-00</a></div>
      <div class="info-block"><i class="fas fa-map-marker-alt"></i> Адрес организации</div>
      <div class="info-block"><i class="fas fa-envelope"></i><a href="mailto:email@voda.gov.ru">email@voda.gov.ru</a></div>
      <div class="info-block"><i class="fas fa-globe"></i><a href="https://www.m-obvu.ru/" target="_blank">www.m-obvu.ru</a></div>
      <div class="info-block"><i class="fab fa-vk"></i><a href="#" target="_blank">vk.com/link</a></div>

      <div class="quote">"Ваш мотивирующий девиз или цитата"</div>

      <div class="d-flex gap-2">
        <a href="contact.vcf" class="btn btn-primary w-100"><i class="fas fa-download"></i> Скачать контакт</a>
        <button class="btn btn-primary w-100" onclick="document.body.classList.toggle('visually-impaired')">
          <i class="fas fa-low-vision"></i> Версия для слабовидящих
        </button>
      </div>
    </div>
  </div>
</body>
</html>
